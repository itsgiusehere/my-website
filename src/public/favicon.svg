<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Diamond outline — squared proportions -->
  <!-- Outer shape -->
  <polygon points="6,13 16,27 26,13 21,5 11,5" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Crown girdle line -->
  <line x1="6" y1="13" x2="26" y2="13" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Crown facet lines -->
  <line x1="11" y1="5" x2="13" y2="13" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="21" y1="5" x2="19" y2="13" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Pavilion facet line -->
  <line x1="16" y1="13" x2="16" y2="27" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
